<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人成績確認アプリ（応用情報工学科版）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>📊 個人成績確認アプリ</h1>
        <p style="text-align: center; color: #666; font-size: 13px; margin-top: -10px;">応用情報工学科 卒業判定対応</p>

        <div id="password-screen" class="hidden">
            <h3 id="pwd-title">パスワードを設定してください</h3>
            <input type="password" id="pwd-input" placeholder="4桁の数字など">
            <button id="pwd-btn">決定</button>
            <p id="pwd-error" class="error"></p>
        </div>

        <div id="main-screen" class="hidden">

            <div class="card">
                <h3>✍️ 成績の追加</h3>
                <div class="form-group" style="flex-direction: column; gap: 10px;">
                    <div>
                        <label style="font-size: 13px; display:block; margin-bottom: 4px;">履修した科目を選択:</label>
                        <select id="course-select" style="width: 100%;">
                            </select>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <label style="font-size: 13px;">評価:</label>
                        <select id="course-grade" style="flex-grow: 1;">
                            <option value="S">S (4点)</option>
                            <option value="A">A (3点)</option>
                            <option value="B">B (2点)</option>
                            <option value="C">C (1点)</option>
                            <option value="D">D (0点・不合格)</option>
                            <option value="E">E (0点・不合格)</option>
                        </select>
                        <button id="add-btn" style="padding: 8px 20px;">追加</button>
                    </div>
                </div>
            </div>

            <div class="card result-box">
                <div>現在の通算GPA: <span id="gpa-display">0.00</span></div>
            </div>

            <div class="card">
                <h3>📊 卒業要件の充足状況</h3>
                <div id="category-summary" style="font-size: 14px; display: flex; flex-direction: column; gap: 8px;">
                    </div>
            </div>

            <h3>📋 履修科目一覧</h3>
            <table id="course-table">
                <thead>
                    <tr>
                        <th>授業名</th>
                        <th>区分（群/必選択）</th>
                        <th>単位</th>
                        <th>成績</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="course-list">
                    </tbody>
            </table>

            <button id="reset-btn" class="danger-btn">データをすべてリセットする</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
